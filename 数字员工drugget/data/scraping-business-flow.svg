<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">药品价格抓取任务业务流程</title>
  <desc id="desc">从原始业务资料构建知识库，生成抓取任务，经淘宝或药师帮的店内搜索和全站搜索发现候选，再进入详情页核验、价格标准化、控价判断、证据落库、人工事件和责任路由。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7f9fc"/><stop offset="1" stop-color="#eef3f8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#19324d" flood-opacity=".12"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#55708c"/></marker>
    <style>
      .bg{fill:url(#bg)} .title{font:700 30px Arial,"Microsoft YaHei",sans-serif;fill:#17324d}.sub{font:400 16px Arial,"Microsoft YaHei",sans-serif;fill:#55708c}
      .lane{fill:#fff;stroke:#d6e0ea;stroke-width:2;rx:18;filter:url(#shadow)} .laneTitle{font:700 20px Arial,"Microsoft YaHei",sans-serif;fill:#17324d}
      .box{stroke-width:2;rx:12;filter:url(#shadow)} .boxTitle{font:700 16px Arial,"Microsoft YaHei",sans-serif;fill:#17324d}.boxText{font:400 13px Arial,"Microsoft YaHei",sans-serif;fill:#40566d}.small{font:400 12px Arial,"Microsoft YaHei",sans-serif;fill:#6b7f91}
      .input{fill:#e8f3ff;stroke:#5d9bd3}.orchestration{fill:#edf0ff;stroke:#777ed1}.platform{fill:#eaf8f1;stroke:#54a67b}.verify{fill:#fff4df;stroke:#d99b39}.persist{fill:#f1ebff;stroke:#9471c6}.human{fill:#ffecec;stroke:#d56d6d}.future{fill:#f4f5f6;stroke:#a5adb5;stroke-dasharray:7 5}
      .arrow{stroke:#55708c;stroke-width:2.5;fill:none;marker-end:url(#arrow)} .dash{stroke-dasharray:8 6}.note{font:400 13px Arial,"Microsoft YaHei",sans-serif;fill:#8a4b4b}
    </style>
  </defs>
  <rect class="bg" width="1600" height="1040"/>
  <text class="title" x="70" y="62">药品价格抓取任务：业务设计与数据流</text>
  <text class="sub" x="70" y="91">长期监控对象是“店铺/供应商 + 药品 + 规格”；商品链接只是当次发现结果，不是长期调度主键</text>

  <rect class="lane" x="50" y="125" width="1500" height="170"/>
  <text class="laneTitle" x="80" y="160">一、业务知识准备（离线）</text>
  <rect class="box input" x="80" y="185" width="220" height="78"/>
  <text class="boxTitle" x="100" y="214">data/raw/*</text><text class="boxText" x="100" y="237">历史价格、店铺档案、</text><text class="boxText" x="100" y="256">价格标准和责任关系</text>
  <path class="arrow" d="M300 224 H370"/>
  <rect class="box orchestration" x="370" y="185" width="250" height="78"/><text class="boxTitle" x="390" y="214">build_knowledge_base.py</text><text class="boxText" x="390" y="237">清洗、识别、去重、质量检查</text><text class="boxText" x="390" y="256">形成可调度的业务事实</text>
  <path class="arrow" d="M620 224 H690"/>
  <rect class="box input" x="690" y="185" width="250" height="78"/><text class="boxTitle" x="710" y="214">data/knowledge-base/*.csv</text><text class="boxText" x="710" y="237">店铺 / 药品 / 规格 / 控价 /</text><text class="boxText" x="710" y="256">责任人 / 历史线索</text>
  <path class="arrow" d="M940 224 H1010"/>
  <rect class="box orchestration" x="1010" y="185" width="270" height="78"/><text class="boxTitle" x="1030" y="214">build_test_knowledge_base.py</text><text class="boxText" x="1030" y="237">抽取小规模测试集和任务种子</text><text class="boxText" x="1030" y="256">STORE_SEARCH / GLOBAL_SEARCH</text>
  <path class="arrow" d="M1280 224 H1350"/>
  <rect class="box persist" x="1350" y="185" width="160" height="78"/><text class="boxTitle" x="1370" y="214">测试 SQLite</text><text class="boxText" x="1370" y="237">调度输入</text><text class="boxText" x="1370" y="256">可恢复样本</text>

  <rect class="lane" x="50" y="330" width="1500" height="250"/>
  <text class="laneTitle" x="80" y="365">二、任务编排与平台采集（在线）</text>
  <rect class="box orchestration" x="80" y="398" width="260" height="92"/><text class="boxTitle" x="100" y="427">run_fixture_live_smoke.py</text><text class="boxText" x="100" y="450">创建批次、种子入队、启动闭环</text><text class="boxText" x="100" y="470">（淘宝/药师帮当前主入口）</text>
  <path class="arrow" d="M340 444 H410"/>
  <rect class="box orchestration" x="410" y="398" width="260" height="92"/><text class="boxTitle" x="430" y="427">services.py + orchestrator.py</text><text class="boxText" x="430" y="450">领取任务、限速、重试、分平台执行</text><text class="boxText" x="430" y="470">搜索成功后升级详情任务</text>
  <path class="arrow" d="M670 444 H745"/>
  <rect class="box platform" x="745" y="388" width="330" height="112"/><text class="boxTitle" x="765" y="417">双路线业务入口</text><text class="boxText" x="765" y="442">路线一：已知店铺/供应商 → 店内搜索</text><text class="boxText" x="765" y="464">路线二：平台全站搜索 → 发现新店/新链接</text><text class="boxText" x="765" y="486">两路都只产出“候选”，不直接算正式价格</text>
  <path class="arrow" d="M1075 444 H1150"/>
  <rect class="box platform" x="1150" y="398" width="350" height="92"/><text class="boxTitle" x="1170" y="427">平台 OpenCLI + Chrome 会话</text><text class="boxText" x="1170" y="450">淘宝 shop-search.js</text><text class="boxText" x="1170" y="470">药师帮 search.js / provider-search.js</text>
  <text class="small" x="80" y="540">run_taobao_store_closed_loop.py：淘宝单店受限闭环入口（过渡/专用）；collector.py：统一调用 OpenCLI、解析 JSON、识别平台访问状态</text>

  <rect class="lane" x="50" y="615" width="1500" height="250"/>
  <text class="laneTitle" x="80" y="650">三、候选确认与业务判断</text>
  <rect class="box verify" x="80" y="683" width="250" height="100"/><text class="boxTitle" x="100" y="712">search.py + services.py</text><text class="boxText" x="100" y="735">链接规范化、商品去重</text><text class="boxText" x="100" y="755">区分既有对象、新链接、新店</text>
  <path class="arrow" d="M330 733 H405"/>
  <rect class="box verify" x="405" y="683" width="250" height="100"/><text class="boxTitle" x="425" y="712">详情页核验</text><text class="boxText" x="425" y="735">detail.js 读取详情价、规格、</text><text class="boxText" x="425" y="755">店铺、库存、起购量和厂家</text><text class="boxText" x="425" y="775">核验通过才是 formal price</text>
  <path class="arrow" d="M655 733 H730"/>
  <rect class="box verify" x="730" y="683" width="250" height="100"/><text class="boxTitle" x="750" y="712">catalog.py + pricing.py</text><text class="boxText" x="750" y="735">品牌/通用名/规格标准化</text><text class="boxText" x="750" y="755">包装换算、单盒价、最小单位价</text>
  <path class="arrow" d="M980 733 H1055"/>
  <rect class="box verify" x="1055" y="683" width="250" height="100"/><text class="boxTitle" x="1075" y="712">decisions.py</text><text class="boxText" x="1075" y="735">匹配完整规格 + 有效期控价</text><text class="boxText" x="1075" y="755">below_control / above_control /</text><text class="boxText" x="1075" y="775">not_comparable</text>
  <path class="arrow" d="M1305 733 H1380"/>
  <rect class="box persist" x="1380" y="683" width="120" height="100"/><text class="boxTitle" x="1400" y="712">结果</text><text class="boxText" x="1400" y="735">价格</text><text class="boxText" x="1400" y="755">判断</text><text class="boxText" x="1400" y="775">案件候选</text>

  <path class="arrow dash" d="M915 500 V683"/>
  <text class="small" x="930" y="595">搜索候选升级</text>

  <rect class="lane" x="50" y="900" width="1500" height="100"/>
  <text class="laneTitle" x="80" y="935">四、留痕、异常和后续动作</text>
  <rect class="box persist" x="390" y="920" width="260" height="58"/><text class="boxTitle" x="410" y="946">models.py + database.py</text><text class="boxText" x="410" y="966">批次 / 任务 / 候选 / 价格 / 事件入库</text>
  <rect class="box persist" x="700" y="920" width="250" height="58"/><text class="boxTitle" x="720" y="946">evidence.py + CSV 导出</text><text class="boxText" x="720" y="966">原始字段、截图、哈希、审计包</text>
  <rect class="box human" x="1000" y="920" width="250" height="58"/><text class="boxTitle" x="1020" y="946">incidents.py + /workbench</text><text class="boxText" x="1020" y="966">登录/验证码/限流/改版 → 人工恢复</text>
  <rect class="box future" x="1300" y="920" width="200" height="58"/><text class="boxTitle" x="1320" y="946">routing.py / alerts.py</text><text class="boxText" x="1320" y="966">当前仅 dry-run / 待分配</text>
  <path class="arrow" d="M1440 783 V895"/><path class="arrow" d="M520 783 V910"/><path class="arrow" d="M830 783 V910"/>
  <text class="note" x="80" y="1025">当前边界：淘宝、药师帮的采集闭环已验证；京东适配器和常驻调度暂缓，真实钉钉通知与公司业务系统尚未接通。</text>
</svg>
